# Builds the console's static SPA into an nginx image and publishes it to the
# GitHub Container Registry, then cuts a GitHub Release.
#
# Triggers:
#   - push tag matching v*  — full build + push + GitHub Release.
#       git tag v0.1.0 && git push origin v0.1.0
#   - workflow_dispatch     — manual run from the Actions tab. Builds and pushes
#       the image (tagged with the chosen label / commit SHA) but creates NO
#       Release. Handy for ad-hoc deploy images off main.
#
# Day-to-day correctness is covered by ci.yml; release builds run only on demand.
name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Image tag label (e.g. v0.1.0-rc1). Empty = commit SHA.'
        required: false
        default: ''
  push:
    tags:
      - 'v*'

permissions:
  contents: write # create the GitHub Release
  packages: write # push the image to GHCR

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  image:
    name: Build & push console image → GHCR
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Derive image tags. Tag pushes produce semver tags (v1.2.3, 1.2.3, 1.2,
      # latest); manual runs produce the chosen label or a dev-<sha> tag.
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/open-streamer-console
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=${{ inputs.version }},enable=${{ inputs.version != '' }}
            type=sha,prefix=dev-,enable=${{ github.event_name == 'workflow_dispatch' && inputs.version == '' }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # The SPA bakes VITE_API_BASE_URL at build time (Vite). Set the
          # `VITE_API_BASE_URL` repo/org variable to point the published image
          # at the production API; falls back to the Dockerfile default
          # (http://localhost:8080) when unset.
          build-args: |
            VITE_API_BASE_URL=${{ vars.VITE_API_BASE_URL || 'http://localhost:8080' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    name: Create GitHub Release
    needs: image
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create release with auto-generated notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes \
            --verify-tag
