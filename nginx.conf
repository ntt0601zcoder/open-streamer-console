server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # SPA history fallback — React Router handles routes client-side.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Hashed Vite assets are content-addressed, safe to cache forever.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # Never cache the entry HTML so deploys take effect immediately.
  location = /index.html {
    add_header Cache-Control "no-store";
  }

  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    image/svg+xml;
}
